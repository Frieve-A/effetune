title: "Frieve EffeTune"
description: "Color the music, unleash your senses. Build precise effect chains for streaming, local files, physical sources, measurement, and multichannel playback."
url: "https://effetune.frieve.com"
baseurl: ""
lang: en

# Author/Organization info for SEO
author:
  name: "Frieve"
  url: "https://www.frieve.com"

# Social/SEO settings
twitter:
  username: frievea
  card: summary_large_image

social:
  name: "Frieve EffeTune"
  links:
    - https://github.com/Frieve-A/effetune
    - https://www.youtube.com/@frieveamusic
    - https://discord.gg/gf95v3Gza2

# Open Graph defaults
logo: /images/icon_512x512.png
image: /images/ogp.jpg

# Markdown and build settings
markdown: kramdown
highlighter: rouge

kramdown:
  input: GFM
  hard_wrap: false
  syntax_highlighter: rouge

# Plugins
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-relative-links

relative_links:
  enabled: true
  collections: true

exclude:
  - .agents/
  - .codex/
  - .cursor/
  - .github/
  - .jekyll-cache/
  - .npm-cache/
  - .qodo/
  - .tmp/
  - .VSCodeCounter/
  - .worktrees/
  - _site/
  - AGENTS.md
  - build/
  - code_review.md
  - dist/
  - electron/
  - eslint.config.mjs
  - node_modules/
  - out/
  - package-lock.json
  - scripts/
  - server.py
  - tests/
  - tmp/
  - tools/

# Favicon configuration
favicon_ico: "/images/favicon.ico"

# Default front matter
defaults:
  # Root index.md includes README.md -> index.html
  - scope:
      path: "index.md"
    values:
      layout: "home"
      title: "Frieve EffeTune - Real-time Audio Effect Processor"
      description: "A real-time audio effect processor for audio enthusiasts. Features 50+ professional effects, drag-and-drop interface, and live visualization. Free for Windows, macOS, Linux, and web browsers."
      image: /images/ogp.jpg
      permalink: /
  # Japanese overview
  - scope:
      path: "docs/i18n/ja/index.md"
    values:
      layout: "default"
      title: "Frieve EffeTune - リアルタイムオーディオエフェクトプロセッサ"
      description: "オーディオ愛好家のためのリアルタイムオーディオエフェクトプロセッサ。EQ、コンプレッサー、リバーブなど50以上のエフェクトを搭載。"
      lang: "ja"
      image: /images/ogp.jpg
      permalink: /docs/i18n/ja/
  # Korean overview
  - scope:
      path: "docs/i18n/ko/index.md"
    values:
      layout: "default"
      title: "Frieve EffeTune - 실시간 오디오 이펙트 프로세서"
      description: "오디오 애호가를 위한 실시간 오디오 이펙트 프로세서. EQ, 컴프레서, 리버브 등 50개 이상의 이펙트 제공."

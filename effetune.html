    <script>
        // Apply the Web startup view preference before the effect pipeline markup can paint.
        (function() {
            if (window.electronAPI) {
                return;
            }

            try {
                var params = new URLSearchParams(window.location.search || '');
                if (params.has('p') || params.has('dbt')) {
                    return;
                }

                var rawConfig = window.localStorage && window.localStorage.getItem('effetune_app_config');
                var config = rawConfig ? JSON.parse(rawConfig) : null;
                if (config && config.startupView === 'library') {
                    document.body.classList.add('view-library');
                }
            } catch (error) {
                // Startup view is optional; invalid or unavailable storage falls back to Effect Pipeline.
            }
        })();

name: Library Scale Fixed Reference Evidence

on:
  workflow_dispatch:
    inputs:
      candidate_sha:
        description: Exact 40-character commit SHA selected as this workflow's ref
        required: true
        type: string
      backend:
        description: Backend measured by this fixed reference machine
        required: true
        type: choice
        options:
          - electron
          - web
      web_test_url:
        description: Existing secure test origin for the Web OPFS backend
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: library-scale-reference-${{ inputs.backend }}
  cancel-in-progress: false

jobs:
  performance:
    runs-on:
      - self-hosted
      - effetune-library-scale-reference
      - effetune-library-scale-${{ inputs.backend }}-reference
    timeout-minutes: 360
    steps:
      - name: Checkout the exact candidate
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.candidate_sha }}

      - name: Verify workflow ref and checkout identity
        env:
          CANDIDATE_SHA: ${{ inputs.candidate_sha }}
          WORKFLOW_SHA: ${{ github.sha }}
        run: >-
          node -e "const cp=require('node:child_process');
          const expected=process.env.CANDIDATE_SHA;
          const workflow=process.env.WORKFLOW_SHA;
          const actual=cp.execFileSync('git',['rev-parse','HEAD'],{encoding:'utf8'}).trim();
          if(!/^[0-9a-f]{40}$/.test(expected)||workflow!==expected||actual!==expected)
          throw new Error('The selected workflow ref and checkout must equal candidate_sha');"

      - name: Validate the Web test origin
        if: inputs.backend == 'web'
        env:
          WEB_TEST_URL: ${{ inputs.web_test_url }}
        run: >-
          node -e "const value=process.env.WEB_TEST_URL;
          const url=new URL(value);
          const local=['localhost','127.0.0.1','[::1]'].includes(url.hostname);
          if(url.protocol!=='https:'&&!(url.protocol==='http:'&&local))
          throw new Error('web_test_url must be HTTPS or a loopback HTTP origin');"

      - name: Reject a Web URL for the Electron backend
        if: inputs.backend == 'electron' && inputs.web_test_url != ''
        run: >-
          node -e "throw new Error('web_test_url must be empty for the Electron backend');"

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium for Web OPFS
        if: inputs.backend == 'web'
        run: npx playwright install chromium

      - name: Validate completed Phase 4 scope
        run: node tools/library-scale/validate-phase-manifest.mjs --mode release

      - name: Validate the release-to-Phase-0 exact join
        run: node tools/library-scale/validate-phase-joins.mjs --stage release

      - name: Prepare the evidence directory
        run: node -e "require('node:fs').mkdirSync('reference-evidence',{recursive:true})"

      - name: Run the fixed-reference million-track performance shard
        env:
          LIBRARY_SCALE_BACKEND: ${{ inputs.backend }}
          LIBRARY_SCALE_WEB_URL: ${{ inputs.web_test_url }}
          LIBRARY_SCALE_CANDIDATE_SHA: ${{ inputs.candidate_sha }}
          LIBRARY_SCALE_WORKFLOW_RUN_ID: ${{ github.run_id }}
        run: >-
          npm run test:library-scale:release --
          --evidence reference-evidence/production-performance.json
          > reference-evidence/release.log

      - name: Write immutable run metadata
        env:
          EVIDENCE_BACKEND: ${{ inputs.backend }}
          EVIDENCE_CANDIDATE_SHA: ${{ inputs.candidate_sha }}
          EVIDENCE_RUN_ID: ${{ github.run_id }}
          EVIDENCE_RUN_ATTEMPT: ${{ github.run_attempt }}
          EVIDENCE_RUNNER_NAME: ${{ runner.name }}
          EVIDENCE_RUNNER_OS: ${{ runner.os }}
          EVIDENCE_RUNNER_ARCH: ${{ runner.arch }}
        run: >-
          node --input-type=module -e "import fs from 'node:fs';
          import {evaluateReleasePerformanceEvidence} from './tools/library-scale/release-performance-contract.mjs';
          const env=process.env;
          const evidence=JSON.parse(fs.readFileSync('reference-evidence/production-performance.json','utf8'));
          const decision=evaluateReleasePerformanceEvidence(evidence,{expectedBackend:env.EVIDENCE_BACKEND,
          expectedCommitSha:env.EVIDENCE_CANDIDATE_SHA,expectedWorkflowRunId:env.EVIDENCE_RUN_ID});
          if(!decision.valid||!decision.passed)throw new Error(decision.errors.join('; '));
          const manifest={schemaVersion:1,kind:'library-scale-performance',backend:env.EVIDENCE_BACKEND,
          commitSha:env.EVIDENCE_CANDIDATE_SHA,workflowRunId:env.EVIDENCE_RUN_ID,
          workflowRunAttempt:env.EVIDENCE_RUN_ATTEMPT,
          runner:{name:env.EVIDENCE_RUNNER_NAME,os:env.EVIDENCE_RUNNER_OS,arch:env.EVIDENCE_RUNNER_ARCH},
          performanceArtifactDigest:evidence.artifactDigest,result:'passed'};
          fs.writeFileSync('reference-evidence/manifest.json',JSON.stringify(manifest,null,2)+'\n');"

      - name: Upload fixed-reference evidence
        uses: actions/upload-artifact@v7
        with:
          name: library-scale-performance-${{ inputs.backend }}-${{ inputs.candidate_sha }}
          path: reference-evidence/
          if-no-files-found: error
          retention-days: 90

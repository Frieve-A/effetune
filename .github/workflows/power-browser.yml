name: Power Browser

on:
  pull_request:

permissions:
  contents: read

jobs:
  power-browser:
    name: power-browser
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install project dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Verify source and tests
        run: npm run verify

      - name: Run mandatory power browser smoke
        run: npm run test:power-browser
